<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perros La 30 - Sistema de Órdenes (Cloud)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        /* Indicador de conexión */
        #connection-status { transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col font-sans min-h-screen">

    <!-- HEADER PRINCIPAL -->
    <header class="bg-red-600 text-white shadow-md z-50 sticky top-0 shrink-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <span class="font-black text-2xl tracking-tighter">PERROS LA 30</span>
                    <span class="text-xs font-medium uppercase tracking-widest bg-red-800 px-2 py-0.5 rounded-full hidden sm:block">Los Originales</span>
                    <!-- Indicador de Nube -->
                    <div id="connection-status" class="ml-2 bg-yellow-500 text-yellow-900 text-[10px] font-bold px-2 py-1 rounded flex items-center gap-1 animate-pulse">
                        Conectando...
                    </div>
                </div>
                
                <nav class="flex space-x-1 sm:space-x-4">
                    <button onclick="switchView('mesero')" id="tab-mesero" class="flex items-center gap-2 px-3 sm:px-4 py-2 rounded-lg text-sm sm:text-base font-medium transition-colors bg-white text-red-600 shadow">
                        <i data-lucide="utensils" class="w-5 h-5"></i> <span class="hidden sm:inline">Tomar Orden</span>
                    </button>
                    <button onclick="switchView('cocina')" id="tab-cocina" class="flex items-center gap-2 px-3 sm:px-4 py-2 rounded-lg text-sm sm:text-base font-medium transition-colors relative text-red-100 hover:bg-red-500">
                        <i data-lucide="chef-hat" class="w-5 h-5"></i> <span class="hidden sm:inline">Cocina</span>
                        <span id="badge-cocina" class="hidden absolute -top-1 -right-1 bg-yellow-400 text-yellow-900 text-xs font-bold px-1.5 py-0.5 rounded-full">0</span>
                    </button>
                    <button onclick="switchView('caja')" id="tab-caja" class="flex items-center gap-2 px-3 sm:px-4 py-2 rounded-lg text-sm sm:text-base font-medium transition-colors relative text-red-100 hover:bg-red-500">
                        <i data-lucide="receipt" class="w-5 h-5"></i> <span class="hidden sm:inline">Caja</span>
                        <span id="badge-caja" class="hidden absolute -top-1 -right-1 bg-green-400 text-green-900 text-xs font-bold px-1.5 py-0.5 rounded-full">0</span>
                    </button>
                </nav>
            </div>
        </div>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6">
        
        <!-- VISTA MESERO -->
        <div id="view-mesero" class="flex flex-col lg:flex-row gap-4 fade-in lg:h-[calc(100vh-7rem)]">
            <!-- Menú y Categorías -->
            <div class="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden h-[60vh] lg:h-full">
                <div id="categories-container" class="flex overflow-x-auto bg-gray-50 p-2 gap-2 border-b shrink-0">
                    <!-- Categorías se renderizan aquí -->
                </div>
                <div class="p-4 overflow-y-auto flex-1 bg-gray-50">
                    <div id="products-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                        <!-- Productos se renderizan aquí -->
                    </div>
                </div>
            </div>

            <!-- Ticket / Resumen de Orden -->
            <div class="w-full lg:w-[400px] shrink-0 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col h-[70vh] lg:h-full overflow-hidden">
                <div class="p-4 bg-gray-900 text-white rounded-t-xl flex justify-between items-center shrink-0">
                    <h2 class="text-xl font-bold">Orden #<span id="order-counter-display">...</span></h2>
                    <div class="flex items-center gap-3">
                        <button onclick="clearCurrentOrder()" id="btn-clear-order" class="hidden text-gray-400 hover:text-red-400 p-1.5 bg-gray-800 rounded-full transition-colors flex items-center justify-center" title="Vaciar Orden">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                        <span id="header-table-badge" class="hidden bg-red-600 px-3 py-1 rounded-full text-sm font-bold"></span>
                    </div>
                </div>

                <div class="p-4 border-b space-y-3 shrink-0">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Mesero</label>
                        <input type="text" id="waiter-name" oninput="window.state.waiterName = this.value" placeholder="Ej. Carlos" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-red-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Mesa</label>
                        <button onclick="openMapModal()" id="table-selector-btn" class="w-full border rounded-lg p-2 flex items-center justify-between focus:ring-2 focus:ring-red-500 outline-none transition-colors bg-gray-50 hover:bg-red-50">
                            <span id="table-selector-text" class="font-bold text-gray-500">Seleccionar Mesa...</span>
                            <i data-lucide="map" id="table-selector-icon" class="text-gray-400 w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <!-- Lista de Items -->
                <div id="cart-items" class="flex-1 overflow-y-auto p-2 space-y-2 bg-gray-50">
                    <!-- Items del carrito -->
                </div>

                <!-- Totales y Botón Enviar -->
                <div class="p-4 border-t bg-white rounded-b-xl shrink-0">
                    <input type="text" id="general-note" oninput="window.state.generalNote = this.value" placeholder="Observaciones generales..." class="w-full border rounded-lg p-2 mb-4 text-sm focus:ring-2 focus:ring-red-500 outline-none">
                    <div class="flex justify-between items-center mb-4 text-lg">
                        <span class="font-bold text-gray-600">Total:</span>
                        <span id="cart-total" class="font-extrabold text-2xl text-red-600">$0</span>
                    </div>
                    <button onclick="submitOrder()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow-lg transition-colors flex items-center justify-center gap-2 text-lg">
                        <i data-lucide="cloud-upload" class="w-6 h-6"></i>
                        Enviar Orden a la Nube
                    </button>
                </div>
            </div>
        </div>

        <!-- VISTA COCINA -->
        <div id="view-cocina" class="hidden flex flex-col fade-in lg:h-[calc(100vh-7rem)] min-h-[80vh]">
            <div class="mb-4 shrink-0 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                        <i data-lucide="chef-hat" class="text-orange-500 w-8 h-8"></i> Monitor de Cocina
                    </h2>
                    <p class="text-gray-500">Órdenes separadas por estación</p>
                </div>
                
                <div class="flex space-x-1 sm:space-x-2 bg-gray-200 p-1.5 rounded-xl overflow-x-auto">
                    <button onclick="setKitchenStation('perrero')" id="tab-station-perrero" class="px-4 py-2 bg-white font-bold text-red-600 rounded-lg shadow transition-all whitespace-nowrap">
                        Perrero
                    </button>
                    <button onclick="setKitchenStation('hamburguesero')" id="tab-station-hamburguesero" class="px-4 py-2 font-bold text-gray-600 hover:text-gray-800 rounded-lg transition-all whitespace-nowrap">
                        Hamburguesero
                    </button>
                    <button onclick="setKitchenStation('general')" id="tab-station-general" class="px-4 py-2 font-bold text-gray-600 hover:text-gray-800 rounded-lg transition-all whitespace-nowrap">
                        Otras Prep.
                    </button>
                </div>
            </div>
            
            <div id="kitchen-container" class="flex-1 overflow-y-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 items-start pb-6 content-start">
                <!-- Tarjetas de cocina -->
            </div>
        </div>

        <!-- VISTA CAJA -->
        <div id="view-caja" class="hidden flex flex-col fade-in lg:h-[calc(100vh-7rem)] min-h-[80vh]">
            <div class="mb-4 shrink-0">
                <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <i data-lucide="receipt" class="text-green-600 w-8 h-8"></i> Caja y Facturación
                </h2>
                <p class="text-gray-500">Órdenes pendientes de pago (Ticket completo)</p>
            </div>
            <div id="cashier-container" class="flex-1 overflow-y-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 items-start pb-6 content-start">
                <!-- Tarjetas de caja -->
            </div>
        </div>

    </main>

    <!-- MODALES Y NOTIFICACIONES -->
    <div id="toast" class="fixed bottom-4 right-4 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center gap-3 transition-all duration-300 transform translate-y-20 opacity-0 z-[100]">
        <!-- Contenedor del icono seguro para no romper al reemplazar el SVG -->
        <div id="toast-icon-container">
            <i data-lucide="check-circle" class="w-6 h-6"></i>
        </div>
        <span id="toast-message" class="font-medium">Mensaje</span>
    </div>

    <!-- MAPA MODAL -->
    <div id="map-modal" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm hidden fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl overflow-hidden flex flex-col h-[80vh] sm:h-auto">
            <div class="bg-gray-900 text-white p-4 flex justify-between items-center shrink-0">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="map" class="text-red-500"></i> Selecciona una Mesa
                </h3>
                <div class="flex items-center gap-2 sm:gap-4">
                    <button onclick="toggleMultipleTables()" id="btn-multiple-tables" class="text-xs sm:text-sm px-2 sm:px-3 py-1 rounded border border-gray-500 text-gray-200 hover:bg-gray-800 transition-colors">
                        Juntar Mesas
                    </button>
                    <button onclick="confirmTableSelection()" id="btn-confirm-tables" class="hidden text-xs sm:text-sm px-2 sm:px-3 py-1 rounded bg-red-600 hover:bg-red-700 font-bold transition-colors">
                        Confirmar
                    </button>
                    <button onclick="closeMapModal()" class="text-gray-400 hover:text-white transition-colors ml-2">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
            <div class="p-6 bg-gray-100 overflow-auto flex-1 relative">
                <div class="min-w-[700px] h-[450px] bg-white border-4 border-gray-300 rounded-xl relative mx-auto shadow-inner overflow-hidden" id="map-tables-container">
                    <div class="absolute top-0 left-0 w-1/4 h-[35%] border-b-4 border-r-4 border-gray-300 bg-gray-50 flex items-center justify-center">
                        <span class="font-black text-2xl text-gray-400 tracking-widest">CAJA</span>
                    </div>
                    <div class="absolute top-0 left-1/4 w-[45%] h-[35%] border-b-4 border-r-4 border-gray-300 bg-gray-50 flex items-center justify-center">
                        <span class="font-black text-3xl text-gray-400 tracking-widest">COCINA</span>
                    </div>
                    <div class="absolute top-[35%] left-[70%] w-1 h-[65%] bg-gray-300"></div>
                    <div class="absolute top-[35%] left-[25%] w-1 h-[65%] bg-gray-300"></div>
                    <div class="absolute bottom-0 left-[25%] w-32 h-10 border-t-4 border-l-4 border-r-4 border-gray-300 bg-white flex items-center justify-center z-10 translate-x-[-50%] rounded-t-lg">
                        <span class="font-bold text-gray-500">ENTRADA</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE ÉXITO -->
    <div id="success-modal" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm hidden fade-in">
        <div class="bg-white rounded-2xl p-6 md:p-8 max-w-sm w-full text-center shadow-2xl">
            <i data-lucide="check-circle" class="text-green-500 w-20 h-20 mx-auto mb-4"></i>
            <h3 id="success-title" class="text-2xl font-bold text-gray-800 mb-2">¡Orden Enviada!</h3>
            <p id="success-subtitle" class="text-gray-600 mb-6">¿Qué deseas hacer ahora?</p>

            <div class="space-y-3">
                <button onclick="actionNewOrderSameTable()" id="btn-same-table" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-colors shadow-md">
                    Nueva Orden
                </button>
                <button onclick="actionNewOrderOtherTable()" class="w-full bg-white border-2 border-gray-200 hover:border-red-500 text-gray-800 hover:text-red-600 font-bold py-3 rounded-xl transition-colors">
                    Atender Otra Mesa
                </button>
            </div>
        </div>
    </div>

    <!-- LÓGICA DE LA APLICACIÓN Y CONEXIÓN A FIREBASE (MÓDULO) -->
    <script type="module">
        // Importaciones de Firebase V11.6.1
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // CONFIGURACIÓN DE BASE DE DATOS (FIREBASE)
        // ==========================================
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            // Para el entorno de prueba/canvas
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            // ******************************************************************************
            // ATENCIÓN: Cuando subas esto a GitHub Pages, debes reemplazar todo esto
            // por la configuración de tu propia cuenta gratuita de Firebase.
            // ******************************************************************************
            firebaseConfig = {
                apiKey: "AQUI_TU_API_KEY",
                authDomain: "AQUI_TU_DOMINIO.firebaseapp.com",
                projectId: "AQUI_TU_PROJECT_ID",
                storageBucket: "AQUI_TU_BUCKET.appspot.com",
                messagingSenderId: "AQUI_SENDER",
                appId: "AQUI_APP_ID"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'perros-la-30-prod';
        
        // --- BASE DE DATOS MOCK (Menú) ---
        const MENU_CATEGORIES = ['Perros', 'Hamburguesas', 'Arepas', 'Asados', 'Salchipapas', 'Desgranados', 'Bebidas', 'Adicionales'];

        const MOCK_MENU = {
            'Perros': [
                { id: 'p1', name: 'Perro Sencillo', price: 18000 }, { id: 'p2', name: 'Perro Doble', price: 21000 },
                { id: 'p3', name: 'Perro Triple', price: 24000 }, { id: 'p4', name: 'Choriperro', price: 21000 },
                { id: 'p5', name: 'Perra', price: 21000 }, { id: 'p6', name: 'Chow Chow Instagram', price: 25000 },
                { id: 'p7', name: 'San Bernardo', price: 36000 }, { id: 'p8', name: 'Perro con Salchicha Ranchera', price: 21000 },
                { id: 'p9', name: 'Perro Super Ranchero', price: 33000 }, { id: 'p10', name: 'Perro con Salchicha Americana', price: 21000 },
                { id: 'p11', name: 'Perro Vegano', price: 19000 },
                { id: 'p12', name: 'COMBO PS', price: 20000 }, { id: 'p13', name: 'COMBO PT', price: 25000 },
            ],
            'Hamburguesas': [
                { id: 'h1', name: 'Hamburguesa Sencilla', price: 19000 }, { id: 'h2', name: 'Hamburguesa Doble', price: 23000 },
                { id: 'h3', name: 'Hamburguesa Triple', price: 27000 }, { id: 'h4', name: 'Hamburguesa Filete de Pollo', price: 22000 },
                { id: 'h5', name: 'Hamburguesa de Lomo de Cerdo', price: 22000 }, { id: 'h6', name: 'Hamburguesa Vegetariana', price: 20000 },
                { id: 'h7', name: 'Hamburguesa Mixta', price: 28000 }, { id: 'h8', name: 'Reina de la Casa', price: 35000 },
                { id: 'h9', name: 'COMBO HS', price: 20000 }, { id: 'h10', name: 'COMBO HT', price: 25000 },
            ],
            'Arepas': [
                { id: 'ar1', name: 'Arepa Burguer', price: 19000 }, { id: 'ar2', name: 'Arepa Mixta', price: 28000 },
            ],
            'Asados': [
                { id: 'as1', name: 'Chuzo de Pollo', price: 23000 }, { id: 'as2', name: 'Chuzo de Cerdo', price: 23000 },
                { id: 'as3', name: 'Chuzo de Res', price: 27000 }, { id: 'as4', name: 'Costillas BBQ', price: 32000 },
                { id: 'as5', name: 'Picada', price: 56000 }, { id: 'as6', name: 'Chorizo Santarrosano X2', price: 26000 },
            ],
            'Salchipapas': [
                { id: 's1', name: 'Salchipapa Pequeña', price: 19000 }, { id: 's2', name: 'Salchipapa Mediana', price: 23000 },
                { id: 's3', name: 'Salchipapa Megafamiliar', price: 50000 }, { id: 's4', name: 'Salchipapa Americana Pequeña', price: 24000 },
                { id: 's5', name: 'Salchipapa Americana Mediana', price: 28000 }, { id: 's6', name: 'Salchipapa Americana Familiar', price: 62000 },
                { id: 's7', name: 'Choripapa Pequeña', price: 23000 }, { id: 's8', name: 'Choripapa Mediana', price: 27000 },
            ],
            'Desgranados': [
                { id: 'd1', name: 'Desgranado Gratinado', price: 25000 }, { id: 'd2', name: 'Desgranado', price: 25000 },
                { id: 'd3', name: 'Coctel de Huevo', price: 20000 },
            ],
            'Bebidas': [
                { id: 'b1', name: 'Power', price: 5000 }, { id: 'b2', name: 'Gaseosa 400 ML', price: 5000 },
                { id: 'b3', name: 'Agua Sin Gas', price: 5000 }, { id: 'b4', name: 'Agua Con Gas', price: 5000 },
                { id: 'b5', name: 'Gaseosa 1.5L', price: 8000 }, { id: 'b6', name: 'Gaseosa Gopack', price: 5000 },
                { id: 'b7', name: 'Jarra de Limonada', price: 8000 }, { id: 'b8', name: 'Jarra de Jugo', price: 11000 },
                { id: 'b9', name: 'Limonada de Coco', price: 11000 }, { id: 'b10', name: 'Limonada Cherry', price: 11000 },
                { id: 'b11', name: 'Limonada de Mango Biche', price: 11000 }, { id: 'b12', name: 'Limonada de Hierba Buena', price: 11000 },
                { id: 'b13', name: 'Gaseosa Mini', price: 2000 },
            ],
            'Adicionales': [
                { id: 'ad1', name: 'Porción de Huevo', price: 10000 }, { id: 'ad2', name: 'Porción de Tocineta', price: 7000 },
                { id: 'ad3', name: 'Porción de Maíz', price: 4000 }, { id: 'ad4', name: 'Piña Calada', price: 4000 },
                { id: 'ad5', name: 'Queso', price: 6000 }, { id: 'ad6', name: 'Porción Papa 250 GRM', price: 10000 },
            ]
        };

        const FLAT_MENU = [];
        for (const category in MOCK_MENU) {
            MOCK_MENU[category].forEach(item => { FLAT_MENU.push({ ...item, category: category }); });
        }

        const TABLE_POSITIONS = [
            { id: 1, left: '8%', top: '55%' }, { id: 2, left: '18%', top: '55%' },
            { id: 3, left: '6%', top: '85%' }, { id: 4, left: '13%', top: '85%' },
            { id: 5, left: '20%', top: '85%' }, { id: 6, left: '32%', top: '55%' },
            { id: 7, left: '32%', top: '85%' }, { id: 8, left: '40%', top: '85%' },
            { id: 9, left: '48%', top: '85%' }, { id: 10, left: '56%', top: '85%' },
            { id: 11, left: '64%', top: '85%' }, { id: 12, left: '52%', top: '58%' },
            { id: 13, left: '60%', top: '58%' }, { id: 14, left: '68%', top: '58%' },
            { id: 15, left: '76%', top: '85%' }, { id: 16, left: '83%', top: '85%' },
            { id: 17, left: '90%', top: '85%' }, { id: 18, left: '96%', top: '85%' },
            { id: 19, left: '82%', top: '58%' }, { id: 20, left: '92%', top: '58%' }
        ];

        // --- ESTADO GLOBAL ---
        window.state = {
            currentUser: null,
            currentView: 'mesero',
            kitchenStation: 'perrero',
            waiterName: '',
            selectedTables: [],
            isMultipleTableMode: false,
            activeCategory: MENU_CATEGORIES[0],
            currentOrderItems: [],
            generalNote: '',
            orderCounter: 1, // Sincronizado con Firebase
            kitchenTickets: [], // Sincronizado con Firebase
            cashierOrders: [], // Sincronizado con Firebase
            lastSubmittedOrder: null
        };

        let toastTimeout;

        // --- UTILIDADES ---
        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(amount);
        };

        window.showToast = function(message, type = 'success') {
            const toastEl = document.getElementById('toast');
            const iconContainer = document.getElementById('toast-icon-container');
            document.getElementById('toast-message').innerText = message;
            
            // Reemplazamos el contenedor del icono de forma segura para no romper SVGs cacheados
            iconContainer.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-triangle' : 'check-circle'}" class="w-6 h-6"></i>`;
            
            toastEl.className = `fixed bottom-4 right-4 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center gap-3 transition-all duration-300 transform z-[100] ${type === 'error' ? 'bg-red-600' : 'bg-gray-800'}`;
            lucide.createIcons();
            
            setTimeout(() => { toastEl.classList.remove('translate-y-20', 'opacity-0'); }, 10);

            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toastEl.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // ==========================================
        // AUTENTICACIÓN Y CONEXIÓN EN TIEMPO REAL
        // ==========================================
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Error de conexión:", error);
                const statusEl = document.getElementById('connection-status');
                statusEl.innerText = "Modo Local (Sin Nube)";
                statusEl.className = "ml-2 bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded flex items-center gap-1";
            }
        };

        onAuthStateChanged(auth, (user) => {
            window.state.currentUser = user;
            const statusEl = document.getElementById('connection-status');
            
            if (user) {
                statusEl.innerText = "Nube Conectada";
                statusEl.className = "ml-2 bg-green-500 text-white text-[10px] font-bold px-2 py-1 rounded flex items-center gap-1";
                statusEl.classList.remove('animate-pulse');
                setupFirebaseListeners();
            } else {
                statusEl.innerText = "Desconectado";
                statusEl.className = "ml-2 bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded flex items-center gap-1";
            }
        });

        // Escuchar cambios en la base de datos (Sincronización en vivo)
        function setupFirebaseListeners() {
            if (!window.state.currentUser) return;

            // Escuchar Contador Global de Órdenes
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'orderCounter'), (snapshot) => {
                if (snapshot.exists()) {
                    const cloudVal = snapshot.data().value;
                    if (cloudVal >= window.state.orderCounter) {
                        window.state.orderCounter = cloudVal + 1;
                        document.getElementById('order-counter-display').innerText = window.state.orderCounter;
                    }
                }
            }, (error) => console.error("Error contador:", error));

            // Escuchar Órdenes de Cocina
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'kitchenTickets'), (snapshot) => {
                window.state.kitchenTickets = [];
                snapshot.forEach(doc => window.state.kitchenTickets.push(doc.data()));
                window.state.kitchenTickets.sort((a,b) => a.orderId - b.orderId); // Ordenar por antiguo primero
                updateBadges();
                if (window.state.currentView === 'cocina') renderKitchen();
            }, (error) => console.error("Error cocina:", error));

            // Escuchar Órdenes de Caja
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'cashierOrders'), (snapshot) => {
                window.state.cashierOrders = [];
                snapshot.forEach(doc => window.state.cashierOrders.push(doc.data()));
                window.state.cashierOrders.sort((a,b) => a.orderId - b.orderId);
                updateBadges();
                if (window.state.currentView === 'caja') renderCashier();
            }, (error) => console.error("Error caja:", error));
        }

        // ==========================================
        // FUNCIONES DE INTERFAZ EXPUESTAS GLOBALMENTE
        // ==========================================
        
        window.switchView = function(view) {
            window.state.currentView = view;
            document.getElementById('view-mesero').classList.add('hidden');
            document.getElementById('view-cocina').classList.add('hidden');
            document.getElementById('view-caja').classList.add('hidden');
            
            document.getElementById(`view-${view}`).classList.remove('hidden');

            ['mesero', 'cocina', 'caja'].forEach(v => {
                const tab = document.getElementById(`tab-${v}`);
                if (v === view) {
                    tab.className = "flex items-center gap-2 px-3 sm:px-4 py-2 rounded-lg text-sm sm:text-base font-medium transition-colors bg-white text-red-600 shadow relative";
                } else {
                    tab.className = "flex items-center gap-2 px-3 sm:px-4 py-2 rounded-lg text-sm sm:text-base font-medium transition-colors relative text-red-100 hover:bg-red-500 relative";
                }
            });
            
            if(view === 'cocina') renderKitchen();
            if(view === 'caja') renderCashier();
        };

        window.setKitchenStation = function(station) {
            window.state.kitchenStation = station;
            ['perrero', 'hamburguesero', 'general'].forEach(s => {
                const btn = document.getElementById(`tab-station-${s}`);
                if (s === station) {
                    btn.className = "px-4 py-2 bg-white font-bold text-red-600 rounded-lg shadow transition-all whitespace-nowrap";
                } else {
                    btn.className = "px-4 py-2 font-bold text-gray-600 hover:text-gray-800 rounded-lg transition-all whitespace-nowrap";
                }
            });
            renderKitchen();
        };

        window.changeCategory = function(category) {
            window.state.activeCategory = category;
            renderCategories();
            renderProducts();
        };

        window.addItemToOrder = function(productId) {
            const product = FLAT_MENU.find(p => p.id === productId);
            if (!product) return;

            const existingIndex = window.state.currentOrderItems.findIndex(item => item.id === productId && item.note === '');
            if (existingIndex >= 0) {
                window.state.currentOrderItems[existingIndex].quantity += 1;
            } else {
                window.state.currentOrderItems.push({ ...product, quantity: 1, note: '' });
            }
            renderCart();
        };

        window.updateItemQuantity = function(index, delta) {
            const newQty = window.state.currentOrderItems[index].quantity + delta;
            if (newQty > 0) {
                window.state.currentOrderItems[index].quantity = newQty;
            } else {
                window.state.currentOrderItems.splice(index, 1);
            }
            renderCart();
        };

        window.updateItemNoteText = function(index, value, element) {
            window.state.currentOrderItems[index].note = value;
            element.style.height = 'auto';
            element.style.height = element.scrollHeight + 'px';
        };

        window.removeItem = function(index) {
            window.state.currentOrderItems.splice(index, 1);
            renderCart();
        };

        window.clearCurrentOrder = function() {
            window.state.currentOrderItems = [];
            window.state.generalNote = '';
            document.getElementById('general-note').value = '';
            renderCart();
            window.showToast('Orden vaciada correctamente.', 'error');
        };

        // --- MAPA GLOBALS ---
        window.openMapModal = function() {
            window.state.isMultipleTableMode = false;
            document.getElementById('btn-multiple-tables').classList.remove('bg-gray-700', 'text-white');
            document.getElementById('btn-multiple-tables').innerText = 'Juntar Mesas';
            document.getElementById('btn-confirm-tables').classList.add('hidden');
            document.getElementById('map-modal').classList.remove('hidden');
            renderMapTables();
        };

        window.closeMapModal = function() {
            document.getElementById('map-modal').classList.add('hidden');
        };

        window.toggleMultipleTables = function() {
            window.state.isMultipleTableMode = !window.state.isMultipleTableMode;
            const btn = document.getElementById('btn-multiple-tables');
            const confirmBtn = document.getElementById('btn-confirm-tables');
            
            if (window.state.isMultipleTableMode) {
                btn.classList.add('bg-gray-700', 'text-white');
                btn.innerText = "Modo: Varias Mesas";
                confirmBtn.classList.remove('hidden');
            } else {
                btn.classList.remove('bg-gray-700', 'text-white');
                btn.innerText = "Juntar Mesas";
                confirmBtn.classList.add('hidden');
                if(window.state.selectedTables.length > 1) {
                    window.state.selectedTables = [window.state.selectedTables[0]];
                    renderMapTables();
                }
            }
        };

        window.confirmTableSelection = function() {
            if (window.state.selectedTables.length === 0) {
                window.showToast("Selecciona al menos una mesa.", "error");
                return;
            }
            window.closeMapModal();
            renderCart();
        };

        window.selectMapTable = function(id) {
            const tableId = id.toString();
            if (window.state.isMultipleTableMode) {
                const index = window.state.selectedTables.indexOf(tableId);
                if (index > -1) {
                    window.state.selectedTables.splice(index, 1);
                } else {
                    window.state.selectedTables.push(tableId);
                }
                renderMapTables();
            } else {
                window.state.selectedTables = [tableId];
                window.closeMapModal();
                renderCart();
            }
        };

        // ==========================================
        // ESCRITURA EN LA NUBE (FIREBASE)
        // ==========================================
        window.submitOrder = async function() {
            if (!window.state.currentUser) { window.showToast('Esperando conexión a la nube...', 'error'); return; }
            if (!window.state.waiterName.trim()) { window.showToast('Por favor ingresa el nombre del mesero.', 'error'); return; }
            if (window.state.selectedTables.length === 0) { window.showToast('Por favor selecciona una mesa del mapa.', 'error'); return; }
            if (window.state.currentOrderItems.length === 0) { window.showToast('La orden está vacía. Agrega productos.', 'error'); return; }

            // Guardamos el ID actual que vamos a usar y luego sumamos
            const currentOrderId = window.state.orderCounter;
            
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const tableStr = window.state.selectedTables.join(' y ');

            const itemsPerrero = window.state.currentOrderItems.filter(i => i.category === 'Perros' || i.id === 'ad1');
            const itemsHamburguesero = window.state.currentOrderItems.filter(i => i.category === 'Hamburguesas' || i.category === 'Arepas');
            const itemsGeneral = window.state.currentOrderItems.filter(i => !['Perros', 'Hamburguesas', 'Arepas', 'Bebidas'].includes(i.category) && i.id !== 'ad1');

            const baseOrderInfo = {
                orderId: currentOrderId,
                waiter: window.state.waiterName,
                table: tableStr,
                generalNote: window.state.generalNote,
                timestamp: timeString
            };

            const ticketsToSave = [];
            if (itemsPerrero.length > 0) {
                ticketsToSave.push({ ...baseOrderInfo, ticketId: `${currentOrderId}-P`, station: 'perrero', items: JSON.parse(JSON.stringify(itemsPerrero)) });
            }
            if (itemsHamburguesero.length > 0) {
                ticketsToSave.push({ ...baseOrderInfo, ticketId: `${currentOrderId}-H`, station: 'hamburguesero', items: JSON.parse(JSON.stringify(itemsHamburguesero)) });
            }
            if (itemsGeneral.length > 0) {
                ticketsToSave.push({ ...baseOrderInfo, ticketId: `${currentOrderId}-G`, station: 'general', items: JSON.parse(JSON.stringify(itemsGeneral)) });
            }

            const total = window.state.currentOrderItems.reduce((acc, item) => acc + (item.price * item.quantity), 0);
            const cashierOrderToSave = {
                orderId: currentOrderId,
                waiter: window.state.waiterName,
                table: tableStr,
                items: JSON.parse(JSON.stringify(window.state.currentOrderItems)),
                total: total,
                timestamp: timeString,
                status: 'unpaid'
            };

            // Enviamos todo a la nube simultáneamente
            try {
                // 1. Actualizar el contador global para todos los meseros
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'orderCounter'), { value: currentOrderId });

                // 2. Guardar los tickets de cocina
                for (const t of ticketsToSave) {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'kitchenTickets', t.ticketId), t);
                }

                // 3. Guardar orden de caja
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'cashierOrders', currentOrderId.toString()), cashierOrderToSave);

                // Éxito: Limpiar localmente
                window.state.lastSubmittedOrder = { id: currentOrderId, table: tableStr };
                window.state.currentOrderItems = [];
                window.state.generalNote = '';
                document.getElementById('general-note').value = '';
                
                renderCart();
                
                document.getElementById('success-title').innerText = `¡Orden #${window.state.lastSubmittedOrder.id} Enviada!`;
                document.getElementById('success-subtitle').innerText = `¿Qué deseas hacer ahora, ${window.state.waiterName}?`;
                document.getElementById('btn-same-table').innerText = `Nueva Orden (${window.state.selectedTables.length > 1 ? 'Mesas' : 'Mesa'} ${window.state.lastSubmittedOrder.table})`;
                document.getElementById('success-modal').classList.remove('hidden');

            } catch (error) {
                console.error("Error guardando orden:", error);
                window.showToast("Error al subir la orden a la nube.", "error");
            }
        };

        window.completeKitchenTicket = async function(ticketId) {
            if (!window.state.currentUser) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'kitchenTickets', ticketId));
            } catch (error) { console.error("Error completando ticket:", error); }
        };

        window.payCashierOrder = async function(id) {
            if (!window.state.currentUser) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'cashierOrders', id.toString()));
                window.showToast(`Pago registrado para la orden #${id}`);
                // En la vida real, aquí guardarías esto en una colección de "ordenes_pagadas" para el cierre de caja.
            } catch (error) { console.error("Error pagando:", error); }
        };

        window.cancelOrder = async function(id) {
            if (!window.state.currentUser) return;
            try {
                // Borrar de caja
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'cashierOrders', id.toString()));
                // Buscar y borrar todos los tickets de cocina con este orderId
                const ticketsToDelete = window.state.kitchenTickets.filter(t => t.orderId === id);
                for (const t of ticketsToDelete) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'kitchenTickets', t.ticketId));
                }
                window.showToast(`Orden #${id} anulada del sistema.`, 'error');
            } catch (error) { console.error("Error anulando:", error); }
        };

        window.actionNewOrderSameTable = function() {
            window.state.lastSubmittedOrder = null;
            document.getElementById('success-modal').classList.add('hidden');
        };

        window.actionNewOrderOtherTable = function() {
            window.state.lastSubmittedOrder = null;
            window.state.selectedTables = [];
            document.getElementById('success-modal').classList.add('hidden');
            renderCart();
            window.openMapModal();
        };

        // ==========================================
        // FUNCIONES DE RENDERIZADO INTERNAS
        // ==========================================
        function renderCategories() {
            const container = document.getElementById('categories-container');
            container.innerHTML = MENU_CATEGORIES.map(category => `
                <button onclick="changeCategory('${category}')" class="px-4 py-3 rounded-lg font-semibold whitespace-nowrap transition-colors ${window.state.activeCategory === category ? 'bg-red-600 text-white shadow-md' : 'bg-white text-gray-700 border hover:bg-red-50'}">
                    ${category}
                </button>
            `).join('');

        function renderProducts() {
            const container = document.getElementById('products-container');
            const products = MOCK_MENU[window.state.activeCategory] || [];
            container.innerHTML = products.map(p => `
                <button onclick="addItemToOrder('${p.id}')" class="bg-white border rounded-lg p-3 text-left shadow-sm hover:shadow-md hover:border-red-500 transition-all flex flex-col justify-between h-24 active:scale-95">
                    <span class="font-bold text-gray-800 text-sm leading-tight line-clamp-2">${p.name}</span>

        function renderCart() {
            const container = document.getElementById('cart-items');
            
            if (window.state.currentOrderItems.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-400 mt-10">
                        <i data-lucide="utensils" class="mx-auto w-12 h-12 mb-2 opacity-50"></i>
                        <p>La orden está vacía</p>
                    </div>`;
                document.getElementById('btn-clear-order').classList.add('hidden');
            } else {
                document.getElementById('btn-clear-order').classList.remove('hidden');
                container.innerHTML = window.state.currentOrderItems.map((item, index) => `
                    <div class="bg-white p-3 rounded-lg shadow-sm border text-sm relative group">
                        <div class="flex justify-between items-start mb-2 pr-6">
                            <span class="font-bold text-gray-800">${item.name}</span>
                            <span class="font-semibold text-gray-600 whitespace-nowrap">${formatCurrency(item.price * item.quantity)}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="flex items-center space-x-3 bg-gray-100 rounded-lg p-1">
                                <button onclick="updateItemQuantity(${index}, -1)" class="p-1 bg-white rounded shadow-sm text-red-600 hover:bg-red-50"><i data-lucide="minus" class="w-4 h-4"></i></button>
                                <span class="font-bold w-4 text-center">${item.quantity}</span>
                                <button onclick="updateItemQuantity(${index}, 1)" class="p-1 bg-white rounded shadow-sm text-green-600 hover:bg-green-50"><i data-lucide="plus" class="w-4 h-4"></i></button>
                            </div>
                        </div>

                        </button>
                        <div class="mt-3 bg-gray-50 p-2 rounded-lg border border-gray-200 flex items-start gap-2 focus-within:border-red-400 focus-within:bg-white transition-all shadow-inner">
                            <i data-lucide="message-square" class="text-gray-400 mt-0.5 flex-shrink-0 w-4 h-4"></i>
                            <textarea rows="1" placeholder="Especificaciones..." oninput="updateItemNoteText(${index}, this.value, this)" class="w-full text-sm bg-transparent outline-none resize-none overflow-hidden text-gray-700">${item.note}</textarea>
                        </div>
                    </div>
                `).join('');
            }
            
            const total = window.state.currentOrderItems.reduce((acc, item) => acc + (item.price * item.quantity), 0);
            document.getElementById('cart-total').innerText = formatCurrency(total);
            
            const headerBadge = document.getElementById('header-table-badge');
            const tableStr = window.state.selectedTables.join(', ');
            const labelStr = window.state.selectedTables.length > 1 ? 'Mesas ' : 'Mesa ';

            if(window.state.selectedTables.length > 0) {
                headerBadge.innerText = labelStr + tableStr;
                headerBadge.classList.remove('hidden');
            } else {
                headerBadge.classList.add('hidden');
            }

            const tableBtn = document.getElementById('table-selector-btn');
            const tableText = document.getElementById('table-selector-text');
            const tableIcon = document.getElementById('table-selector-icon');

                    tableBtn.className = "w-full border rounded-lg p-2 flex items-center justify-between focus:ring-2 focus:ring-red-500 outline-none transition-colors bg-red-50 border-red-200";
                    tableText.className = "font-bold text-red-700";
                    tableText.innerText = labelStr + tableStr;
                    // Corrección importante: Se usa setAttribute en lugar de .className para evitar errores del DOM en SVG
                    tableIcon.setAttribute('class', "text-red-600 w-5 h-5 lucide lucide-map");
                } else {
                    tableBtn.className = "w-full border rounded-lg p-2 flex items-center justify-between focus:ring-2 focus:ring-red-500 outline-none transition-colors bg-gray-50 hover:bg-red-50";

                    tableIcon.setAttribute('class', "text-gray-400 w-5 h-5 lucide lucide-map");

        function renderMapTables() {
            const container = document.getElementById('map-tables-container');
            const oldButtons = container.querySelectorAll('.table-btn');
            oldButtons.forEach(btn => btn.remove());

            TABLE_POSITIONS.forEach(table => {
                const isSelected = window.state.selectedTables.includes(table.id.toString());
                const btn = document.createElement('button');
                btn.className = `table-btn absolute w-12 h-12 md:w-14 md:h-14 flex items-center justify-center rounded-xl font-black text-lg shadow-md transition-all hover:scale-110 hover:shadow-lg ${isSelected ? 'bg-red-600 text-white ring-4 ring-red-300 scale-110 z-20' : 'bg-white text-gray-800 border-2 border-gray-300 hover:border-red-500 hover:text-red-600 z-10'}`;
                btn.style.left = table.left;
                btn.style.top = table.top;
                btn.style.transform = 'translate(-50%, -50%)';
                btn.innerText = table.id;
                btn.onclick = () => window.selectMapTable(table.id);
                container.appendChild(btn);
            });
        }

                cb.classList.remove('hidden');
            } else { cb.classList.add('hidden'); }

                        </div>
                        <div class="p-4 pt-0 flex gap-2">
                            <button onclick="cancelOrder(${order.orderId})" class="w-1/4 bg-red-100 hover:bg-red-200 text-red-700 font-bold py-3 rounded-lg transition-colors flex items-center justify-center" title="Anular orden">
                                <i data-lucide="x" class="w-5 h-5"></i>
                            </button>
                            <button onclick="payCashierOrder(${order.orderId})" class="w-3/4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow transition-colors flex items-center justify-center gap-2">
                                <i data-lucide="receipt" class="w-5 h-5"></i>
                                Pagar / Imprimir
                            </button>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        // --- ARRANQUE ---
        window.onload = () => {
            renderCategories();
            renderProducts();
            renderCart();
            lucide.createIcons();
            document.getElementById('waiter-name').value = window.state.waiterName;
            initAuth();
        };

    </script>
</body>
</html>
